<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dec-site map</title>
  <script src="data.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --paper: #f7f6f1;
      --panel: #ffffff;
      --ink: #20211d;
      --muted: #6b7068;
      --line: #d8d7cf;
      --coal: #2d332f;
      --teal: #0d7f76;
      --coral: #e45f48;
      --mustard: #d8a526;
      --blue: #466a8f;
      --shadow: 0 18px 45px rgba(32, 33, 29, .12);
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(32, 33, 29, .045) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(rgba(32, 33, 29, .035) 1px, transparent 1px) 0 0 / 34px 34px,
        var(--paper);
      color: var(--ink);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1440px, calc(100% - 36px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-panel {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .login-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 7px;
      background: linear-gradient(90deg, var(--teal), var(--mustard), var(--coral), var(--blue));
    }

    .login-title {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .login-sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfbf7;
      color: var(--ink);
      padding: 0 13px;
      outline: none;
    }

    .input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13, 127, 118, .13);
    }

    .error {
      min-height: 20px;
      color: var(--coral);
      font-size: 12px;
      font-weight: 700;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: end;
      gap: 16px;
      min-width: 0;
    }

    .mark {
      width: 56px;
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--coal);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      box-shadow: 7px 7px 0 var(--mustard);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 5vw, 62px);
      line-height: .92;
    }

    .repo-meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 6px;
      padding: 0 13px;
      background: var(--coal);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(32, 33, 29, .16);
    }

    .btn.secondary {
      background: #fff;
      color: var(--coal);
      border: 1px solid var(--line);
    }

    .btn.icon {
      width: 38px;
      padding: 0;
      flex: 0 0 auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.76);
      padding: 14px;
    }

    .stat b {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      line-height: .9;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 180px;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 18px;
      height: 18px;
    }

    .search-wrap .input {
      padding-left: 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 410px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .client-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 245px);
      overflow: auto;
      padding-right: 4px;
    }

    .client-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-left: 6px solid var(--teal);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    .client-card:hover,
    .client-card.active {
      border-color: var(--coal);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(32, 33, 29, .1);
    }

    .client-card.active {
      border-left-color: var(--coral);
    }

    .client-name {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      font-weight: 900;
      font-size: 18px;
    }

    .badge {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 8px;
      background: #edf6f5;
      color: var(--teal);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mini {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .domain-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .domain {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfbf7;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      min-height: 520px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .detail-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 20px;
      background:
        linear-gradient(135deg, rgba(13,127,118,.12), transparent 45%),
        linear-gradient(225deg, rgba(228,95,72,.1), transparent 38%),
        #fff;
      border-bottom: 1px solid var(--line);
    }

    .detail-title {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .detail-metric {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
    }

    .detail-metric:last-child { border-right: 0; }

    .detail-metric b {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .detail-metric span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .info-band {
      display: grid;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .info-line {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 36px;
    }

    .info-line dt {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .info-line dd {
      margin: 0;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .page-table {
      width: 100%;
      border-collapse: collapse;
    }

    .page-table th,
    .page-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .page-table th {
      position: sticky;
      top: 0;
      background: #fbfbf7;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .page-title {
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .gtm-pill {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .gtm-pill.ok {
      background: #e8f5ef;
      color: #14704f;
    }

    .gtm-pill.partial {
      background: #fff4d7;
      color: #8a5b00;
    }

    .gtm-pill.missing {
      background: #f8e7e2;
      color: #a13b2b;
    }

    .page-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 30px;
      background: rgba(255,255,255,.62);
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--coal);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      font-size: 13px;
      font-weight: 700;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    [hidden] { display: none !important; }

    @media (max-width: 980px) {
      .topbar,
      .layout,
      .filters {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .client-list {
        max-height: none;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding-right: 0;
      }
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100% - 24px, 1440px);
        padding-top: 18px;
      }

      .brand {
        align-items: start;
      }

      .mark {
        width: 46px;
        font-size: 21px;
        box-shadow: 5px 5px 0 var(--mustard);
      }

      .stats,
      .detail-grid,
      .client-list {
        grid-template-columns: 1fr;
      }

      .detail-head,
      .info-line {
        grid-template-columns: 1fr;
      }

      .page-table,
      .page-table tbody,
      .page-table tr,
      .page-table td {
        display: block;
        width: 100%;
      }

      .page-table thead {
        display: none;
      }

      .page-table tr {
        border-bottom: 1px solid var(--line);
      }

      .page-table td {
        border-bottom: 0;
      }

      .page-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main id="login" class="login-shell">
    <form class="login-panel" id="loginForm">
      <h1 class="login-title">dec-site</h1>
      <p class="login-sub">Repository map / client site index</p>
      <div class="field">
        <label for="password">PASSWORD</label>
        <input class="input" id="password" type="password" autocomplete="current-password" autofocus>
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn" type="submit"><i data-lucide="lock-keyhole"></i>開く</button>
    </form>
  </main>

  <main id="app" class="shell" hidden>
    <header class="topbar">
      <div class="brand">
        <div class="mark">D</div>
        <div>
          <h1>dec-site map</h1>
          <p class="repo-meta" id="repoMeta"></p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn secondary" id="copyRoot" type="button" title="リポジトリパスをコピー"><i data-lucide="folder"></i>ローカル</button>
        <a class="btn secondary" id="openPublic" target="_blank" rel="noopener" title="公開ベースURLを開く"><i data-lucide="external-link"></i>公開</a>
        <button class="btn secondary" id="logout" type="button" title="ログアウト"><i data-lucide="log-out"></i></button>
      </div>
    </header>

    <section class="stats" aria-label="summary">
      <div class="stat"><b id="clientTotal">0</b><span>CLIENT DIRECTORIES</span></div>
      <div class="stat"><b id="pageTotal">0</b><span>HTML PAGES</span></div>
      <div class="stat"><b id="gtmTotal">0</b><span>GTM HEAD TAGS</span></div>
      <div class="stat"><b id="assetTotal">0</b><span>MEDIA ASSETS</span></div>
    </section>

    <section class="filters">
      <div class="search-wrap">
        <i data-lucide="search"></i>
        <input class="input" id="search" type="search" placeholder="クライアント名 / URL / パス / タイトルで検索">
      </div>
      <select class="input" id="sort">
        <option value="name">名前順</option>
        <option value="updated">更新が新しい順</option>
        <option value="pages">ページ数が多い順</option>
      </select>
    </section>

    <section class="layout">
      <div>
        <div class="client-list" id="clientList"></div>
      </div>
      <article class="detail" id="detail"></article>
    </section>
  </main>

  <div class="toast" id="toast">Copied</div>

  <script>
    const PASSWORD_HASH = "32b296d3abc4b15ab1ae0976fb3c16106dbb0c523f74a6b4756b4c04bbc81735";
    const AUTH_KEY = "dec-site-map-authenticated";
    const data = window.DEC_SITE_DATA || { clients: [], totals: {}, repository: {} };
    const state = { selectedId: data.clients[0]?.id || "", query: "", sort: "name" };

    const $ = (selector) => document.querySelector(selector);
    const formatDate = (value) => new Intl.DateTimeFormat("ja-JP", {
      year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    }).format(new Date(value));

    const digest = async (text) => {
      const bytes = new TextEncoder().encode(text);
      const buffer = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(buffer)].map((byte) => byte.toString(16).padStart(2, "0")).join("");
    };

    const showToast = (message) => {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1500);
    };

    const copyText = async (text, label = "コピーしました") => {
      try {
        await navigator.clipboard.writeText(text);
        showToast(label);
      } catch {
        showToast("コピーできませんでした");
      }
    };

    const renderGtmBadge = (gtm, totalPages) => {
      const count = gtm?.pageCount ?? (gtm?.hasHeadTag ? 1 : 0);
      const ids = gtm?.ids?.length ? ` / ${gtm.ids.join(", ")}` : "";
      const complete = totalPages ? count === totalPages : Boolean(gtm?.hasHeadTag);
      const status = count === 0 ? "missing" : complete ? "ok" : "partial";
      const label = count === 0 ? "GTM 未設置" : totalPages ? `GTM ${count}/${totalPages}${ids}` : `GTM OK${ids}`;
      return `<span class="gtm-pill ${status}">${label}</span>`;
    };

    const openApp = () => {
      $("#login").hidden = true;
      $("#app").hidden = false;
      render();
    };

    const filteredClients = () => {
      const query = state.query.trim().toLowerCase();
      const rows = data.clients.filter((client) => {
        const haystack = [
          client.name,
          client.publicUrl,
          client.localPath,
          client.primaryTitle,
          client.gtm?.status,
          ...(client.gtm?.ids || []),
          ...client.pages.flatMap((page) => [page.title, page.publicUrl, page.localPath, page.description, ...(page.gtm?.ids || [])])
        ].join(" ").toLowerCase();
        return !query || haystack.includes(query);
      });

      return rows.sort((a, b) => {
        if (state.sort === "updated") return new Date(b.updatedAt) - new Date(a.updatedAt);
        if (state.sort === "pages") return b.pageCount - a.pageCount;
        return a.name.localeCompare(b.name);
      });
    };

    const renderClientList = (clients) => {
      const list = $("#clientList");
      if (clients.length === 0) {
        list.innerHTML = `<div class="empty">一致するサイトがありません</div>`;
        return;
      }

      if (!clients.some((client) => client.id === state.selectedId)) state.selectedId = clients[0].id;

      list.innerHTML = clients.map((client) => `
        <button class="client-card ${client.id === state.selectedId ? "active" : ""}" type="button" data-client="${client.id}">
          <div class="client-name">
            <span>${client.name}</span>
            <span class="badge">${client.pageCount} pages</span>
          </div>
          <div class="mini">${client.primaryTitle}</div>
          <div class="mini">${client.publicUrl}</div>
          <div class="domain-row">
            ${renderGtmBadge(client.gtm, client.pageCount)}
            ${client.externalDomains.slice(0, 3).map((domain) => `<span class="domain">${domain}</span>`).join("")}
          </div>
        </button>
      `).join("");

      list.querySelectorAll("[data-client]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.client;
          render();
        });
      });
    };

    const renderDetail = (clients) => {
      const client = clients.find((item) => item.id === state.selectedId) || clients[0];
      const detail = $("#detail");
      if (!client) {
        detail.innerHTML = `<div class="empty">表示するサイトがありません</div>`;
        return;
      }

      detail.innerHTML = `
        <div class="detail-head">
          <div>
            <h2 class="detail-title">${client.name}</h2>
            <div class="mini">${client.primaryTitle}</div>
          </div>
          <div class="page-actions">
            <a class="btn" href="${client.publicUrl}" target="_blank" rel="noopener"><i data-lucide="external-link"></i>開く</a>
            <button class="btn secondary icon" type="button" data-copy="${client.publicUrl}" title="公開URLをコピー"><i data-lucide="link"></i></button>
          </div>
        </div>
        <div class="detail-grid">
          <div class="detail-metric"><b>${client.pageCount}</b><span>HTML</span></div>
          <div class="detail-metric"><b>${client.gtm.pageCount}/${client.pageCount}</b><span>GTM HEAD</span></div>
          <div class="detail-metric"><b>${client.assetSummary.count}</b><span>ASSETS / ${client.assetSummary.totalMb}MB</span></div>
          <div class="detail-metric"><b>${formatDate(client.updatedAt).slice(0, 10)}</b><span>UPDATED</span></div>
        </div>
        <dl class="info-band">
          <div class="info-line">
            <dt>公開URL</dt>
            <dd><a href="${client.publicUrl}" target="_blank" rel="noopener">${client.publicUrl}</a></dd>
            <button class="btn secondary icon" type="button" data-copy="${client.publicUrl}" title="公開URLをコピー"><i data-lucide="copy"></i></button>
          </div>
          <div class="info-line">
            <dt>ローカル</dt>
            <dd>${client.localPath}</dd>
            <button class="btn secondary icon" type="button" data-copy="${client.localPath}" title="ローカルパスをコピー"><i data-lucide="copy"></i></button>
          </div>
          <div class="info-line">
            <dt>GTM</dt>
            <dd>${renderGtmBadge(client.gtm, client.pageCount)}</dd>
            <span></span>
          </div>
          <div class="info-line">
            <dt>外部リンク</dt>
            <dd>${client.externalDomains.length ? client.externalDomains.join(" / ") : "-"}</dd>
            <span></span>
          </div>
        </dl>
        <table class="page-table">
          <thead>
            <tr>
              <th>PAGE</th>
              <th>PUBLIC URL</th>
              <th>LOCAL PATH</th>
              <th>GTM HEAD</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            ${client.pages.map((page) => `
              <tr>
                <td>
                  <div class="page-title">${page.title}</div>
                </td>
                <td><a href="${page.publicUrl}" target="_blank" rel="noopener">${page.publicUrl}</a></td>
                <td>${page.localPath}</td>
                <td>${renderGtmBadge(page.gtm, 1)}</td>
                <td>
                  <div class="page-actions">
                    <a class="btn secondary icon" href="${page.publicUrl}" target="_blank" rel="noopener" title="開く"><i data-lucide="external-link"></i></a>
                    <button class="btn secondary icon" type="button" data-copy="${page.publicUrl}" title="公開URLをコピー"><i data-lucide="link"></i></button>
                    <button class="btn secondary icon" type="button" data-copy="${page.localPath}" title="ローカルパスをコピー"><i data-lucide="folder"></i></button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      detail.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => copyText(button.dataset.copy));
      });
    };

    const render = () => {
      $("#repoMeta").textContent = `${data.repository.localPath} / generated ${formatDate(data.generatedAt)}`;
      $("#clientTotal").textContent = data.totals.clients || 0;
      $("#pageTotal").textContent = data.totals.pages || 0;
      $("#gtmTotal").textContent = data.totals.gtmPages || 0;
      $("#assetTotal").textContent = data.totals.assets || 0;
      $("#openPublic").href = data.repository.publicBaseUrl || "#";
      const clients = filteredClients();
      renderClientList(clients);
      renderDetail(clients);
      if (window.lucide) lucide.createIcons();
    };

    $("#loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const hash = await digest($("#password").value);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem(AUTH_KEY, "1");
        openApp();
      } else {
        $("#loginError").textContent = "パスワードが違います";
      }
    });

    $("#search").addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    $("#sort").addEventListener("change", (event) => {
      state.sort = event.target.value;
      render();
    });

    $("#copyRoot").addEventListener("click", () => copyText(data.repository.localPath, "リポジトリパスをコピーしました"));
    $("#logout").addEventListener("click", () => {
      sessionStorage.removeItem(AUTH_KEY);
      location.reload();
    });

    if (sessionStorage.getItem(AUTH_KEY) === "1") openApp();
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
